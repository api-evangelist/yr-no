aid: yr-no
name: Yr
description: >-
  Yr is a weather service from the Norwegian Meteorological Institute (MET Norway)
  and the Norwegian Broadcasting Corporation (NRK), providing free, high-quality
  weather forecasts for locations worldwide via a simple REST interface. The MET
  Weather API offers a comprehensive suite of products including location-based
  forecasts, weather alerts, nowcasts, ocean forecasts, aviation weather, sunrise
  and sun event calculations, radar imagery, and historical meteorological
  observation data. All data is open under CC BY 4.0 and requires only a
  User-Agent identification header — no API key or account is needed.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/yr-no/refs/heads/main/apis.yml
